<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Soulvana</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div style="max-width:400px;margin:50px auto;background:white;padding:25px;border-radius:15px;color:black;">
    <h2>❤️ Join Soulvana</h2>

    <input type="text" id="name" placeholder="Full Name" style="width:100%;padding:10px;margin:10px 0;">
    <input type="email" id="email" placeholder="Email" style="width:100%;padding:10px;margin:10px 0;">
    <input type="password" id="password" placeholder="Password" style="width:100%;padding:10px;margin:10px 0;">

    <button id="signupBtn" style="width:100%;margin-top:15px;">Create Account</button>

    <p style="margin-top:20px;">
        Already have an account?
        <a href="login.html">Log In</a>
    </p>

    <p id="message"></p>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

document.getElementById("signupBtn").addEventListener("click", async () => {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);

        await setDoc(doc(db, "users", userCredential.user.uid), {
            name,
            email,
            createdAt: new Date()
        });

        document.getElementById("message").innerHTML = "✅ Account created successfully!";
        window.location.href = "dashboard.html";

    } catch (error) {
        document.getElementById("message").innerHTML = "❌ " + error.message;
    }
});
</script>

</body>
</html>
