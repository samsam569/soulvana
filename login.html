<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - Soulvana</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div style="max-width:400px;margin:50px auto;background:white;padding:25px;border-radius:15px;color:black;">
    <h2>❤️ Welcome Back</h2>

    <input type="email" id="email" placeholder="Email" required style="width:100%;padding:10px;margin:10px 0;">
    <input type="password" id="password" placeholder="Password" required style="width:100%;padding:10px;margin:10px 0;">

    <button id="loginBtn" style="width:100%;margin-top:15px;">Log In</button>

    <p style="margin-top:20px;">
        Don't have an account?
        <a href="signup.html">Create Account</a>
    </p>

    <p id="message" style="color:red;"></p>
</div>

<script type="module">
import { auth } from "./firebase.js";
import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const loginBtn = document.getElementById("loginBtn");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const message = document.getElementById("message");

async function login() {
    const email = emailInput.value.trim();
    const password = passwordInput.value;

    if (!email || !password) {
        message.textContent = "Please enter your email and password.";
        return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = "Logging in...";

    try {
        await signInWithEmailAndPassword(auth, email, password);
        message.style.color = "green";
        message.textContent = "✅ Login successful!";
        window.location.href = "dashboard.html";
    } catch (error) {
        message.style.color = "red";
        message.textContent = error.message;
    }

    loginBtn.disabled = false;
    loginBtn.textContent = "Log In";
}

loginBtn.addEventListener("click", login);

passwordInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") login();
});
</script>

</body>
</html>
