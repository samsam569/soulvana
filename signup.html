<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Soulvana</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div style="max-width:400px;margin:50px auto;background:white;padding:25px;border-radius:15px;color:black;">

<h2>❤️ Create Your Soulvana Account</h2>

<input type="text" id="name" placeholder="Full Name" style="width:100%;padding:10px;margin:10px 0;">

<input type="email" id="email" placeholder="Email" style="width:100%;padding:10px;margin:10px 0;">

<input type="password" id="password" placeholder="Password (Minimum 6 characters)" style="width:100%;padding:10px;margin:10px 0;">

<button id="signupBtn" style="width:100%;padding:12px;margin-top:10px;">
Create Account
</button>

<p style="margin-top:20px;">
Already have an account?
<a href="login.html">Log In</a>
</p>

<p id="message"></p>

</div>

<script type="module">
import { auth, db } from "./firebase.js";

import {
  createUserWithEmailAndPassword,
  updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  doc,
  setDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const signupBtn = document.getElementById("signupBtn");
const message = document.getElementById("message");

signupBtn.addEventListener("click", async () => {

const name = document.getElementById("name").value.trim();
const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value;

if (!name || !email || !password) {
    message.textContent = "Please fill in all fields.";
    return;
}

signupBtn.disabled = true;
signupBtn.textContent = "Creating Account...";

try {

const userCredential = await createUserWithEmailAndPassword(auth, email, password);

await updateProfile(userCredential.user, {
    displayName: name
});

await setDoc(doc(db, "users", userCredential.user.uid), {
    name: name,
    email: email,
    createdAt: serverTimestamp()
});

message.style.color = "green";
message.textContent = "✅ Account created successfully!";

setTimeout(() => {
    window.location.href = "login.html";
}, 1500);

} catch (error) {
    message.style.color = "red";
    message.textContent = error.message;
}

signupBtn.disabled = false;
signupBtn.textContent = "Create Account";

});
</script>

</body>
</html>
