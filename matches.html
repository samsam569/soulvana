<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soulvana Matches</title>
<link rel="stylesheet" href="style.css">

<style>
body{
  font-family:Arial,sans-serif;
  background:#ffe6f0;
  padding:20px;
}
h1{
  text-align:center;
  color:#e60073;
}
.card{
  background:white;
  border-radius:15px;
  padding:20px;
  margin:15px auto;
  max-width:400px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
  text-align:center;
}
.approve{
  background:#00cc66;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:20px;
  cursor:pointer;
}
.back{
  background:#ff4d94;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:10px;
  display:block;
  margin:20px auto;
}
</style>
</head>

<body>

<h1>💞 Soulvana Matches</h1>

<div id="usersContainer">
Loading users...
</div>

<a href="dashboard.html">
<button class="back">Back to Dashboard</button>
</a>

<script type="module">
import { db, auth } from "./firebase.js";
import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const container = document.getElementById("usersContainer");

async function loadUsers(){

container.innerHTML="";

const snapshot = await getDocs(collection(db,"users"));

snapshot.forEach((doc)=>{

const user=doc.data();

if(auth.currentUser && doc.id===auth.currentUser.uid){
return;
}

container.innerHTML += `
<div class="card">
<h2>${user.name || "Unknown"}</h2>

<p><strong>Age:</strong> ${user.age || "-"}</p>

<p><strong>Gender:</strong> ${user.gender || "-"}</p>

<p><strong>Looking For:</strong> ${user.lookingFor || "-"}</p>

<p><strong>Country:</strong> ${user.country || "-"}</p>

<button class="approve">
❤️ Like
</button>

</div>
`;

});

if(container.innerHTML===""){
container.innerHTML="<p>No users found.</p>";
}

}

loadUsers();
</script>

</body>
</html>
